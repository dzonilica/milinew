<!DOCTYPE html>
<html lang="sr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#e63535"/>

  <title>Kragujevac Sport – Vest</title>
  <meta name="description" content="Sportska vest iz Kragujevca – Kragujevac Sport."/>
  <meta name="robots" content="index, follow, max-image-preview:large"/>

  <meta property="og:type" content="article"/>
  <meta property="og:site_name" content="Kragujevac Sport"/>
  <meta property="og:locale" content="sr_RS"/>
  <meta name="twitter:card" content="summary_large_image"/>

  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="mililogo.png" type="image/png"/>
  <link rel="apple-touch-icon" href="mililogo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://djhrxrhucwfygnjvkqyl.supabase.co"/>

  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo" aria-label="Kragujevac Sport – početna">
      <img src="mililogo.png" alt="Kragujevac Sport" class="logo-icon"/>
      Kragujevac<span>Sport</span>
    </a>
    <div class="header-right">
      <span class="header-tag">
        <span class="live-dot"></span>
        Sve sportske vesti iz Kragujevca
      </span>
      <button class="theme-toggle" id="themeToggle" title="Promeni temu" aria-label="Promeni temu">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- PAGE GRID: left banner | article | right banner -->
<div class="page-with-sides">
  <aside class="side-banner" aria-label="Reklamna pozicija levo">
    <div class="side-banner-slot" id="bannerLeft">
      <span class="side-banner-label">Reklama</span>
      <div class="side-banner-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Reklamna<br/>pozicija
      </div>
    </div>
  </aside>

  <div class="article-wrap" id="articleWrap">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Učitavanje vesti...</p>
    </div>
  </div>

  <aside class="side-banner" aria-label="Reklamna pozicija desno">
    <div class="side-banner-slot" id="bannerRight">
      <span class="side-banner-label">Reklama</span>
      <div class="side-banner-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Reklamna<br/>pozicija
      </div>
    </div>
  </aside>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Galerija slika">
  <button class="lightbox-close" id="lbClose" aria-label="Zatvori">×</button>
  <button class="lightbox-nav prev" id="lbPrev" aria-label="Prethodna">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <img id="lbImg" src="" alt=""/>
  <button class="lightbox-nav next" id="lbNext" aria-label="Sledeća">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="mililogo.png" alt="Kragujevac Sport" class="logo-icon"/>
      Kragujevac<span>Sport</span>
    </div>
    <div class="footer-copy">
      © <span id="year"></span> Kragujevac Sport · Sve sportske vesti iz Kragujevca
      <span class="footer-credit">
        Radio <a href="https://lotifystudio.com" target="_blank" rel="noopener">Lotify Studio</a>
      </span>
    </div>
    <div class="footer-socials">
      <a href="https://www.instagram.com/kragujevacsport/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </div>
</footer>

<script>
  const SUPABASE_URL  = 'https://djhrxrhucwfygnjvkqyl.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqaHJ4cmh1Y3dmeWduanZrcXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAzMTYsImV4cCI6MjA4OTk2NjMxNn0.APKFBCb4PfuPoiD4c4p5AdUWe6aXpZZ3eFvifPuzvpw';

  document.getElementById('year').textContent = new Date().getFullYear();

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  const params = new URLSearchParams(window.location.search);
  const qsId = params.get('id');
  const pathParts = window.location.pathname.split('/').filter(p => p && !p.includes('.html'));
  const newsId = qsId || pathParts[pathParts.length - 1] || '';

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleString('sr-RS', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  const backSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>';
  const calSvg  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
  const igSvg   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>';
  const extSvg  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

  let currentGallery = [];
  let lbIdx = 0;

  function buildImages(news) {
    const imgs = [];
    if (news.image_url) imgs.push(news.image_url);
    if (Array.isArray(news.gallery)) {
      for (const g of news.gallery) {
        if (g && g.url && !imgs.includes(g.url)) imgs.push(g.url);
      }
    }
    return imgs;
  }

  function renderArticle(news) {
    const isFromInstagram = news.instagram_post_url &&
      !String(news.instagram_post_id || '').startsWith('manual_') &&
      !String(news.id || '').startsWith('sample-');
    const tag = escapeHtml(news.category || 'Sport');
    currentGallery = buildImages(news);
    const mainImage = currentGallery[0] || null;
    const extraImages = currentGallery.slice(1);

    // Head updates for SEO
    const pageTitle = news.title + ' – Kragujevac Sport';
    document.title = pageTitle;
    setMeta('description', excerpt(news.description || news.title, 155));
    setOg('og:title', pageTitle);
    setOg('og:description', excerpt(news.description || news.title, 155));
    setOg('og:url', location.href);
    if (mainImage) setOg('og:image', mainImage);
    setMeta('twitter:title', pageTitle);
    setMeta('twitter:description', excerpt(news.description || news.title, 155));
    if (mainImage) setMeta('twitter:image', mainImage);
    setCanonical(location.origin + location.pathname + '?id=' + encodeURIComponent(news.id));

    // NewsArticle schema
    injectArticleSchema(news, currentGallery);

    const gallerySection = extraImages.length
      ? '<div class="article-gallery" id="articleGallery">'
        + extraImages.map((url, i) => ''
          + '<button class="gallery-thumb" data-idx="' + (i + 1) + '" aria-label="Otvori sliku ' + (i + 2) + '">'
          +   '<img src="' + escapeHtml(url) + '" alt="" loading="lazy" decoding="async">'
          + '</button>').join('')
        + '</div>'
      : '';

    document.getElementById('articleWrap').innerHTML = ''
      + '<a href="index.html" class="back-btn">' + backSvg + ' Sve vesti</a>'
      + '<div class="article-tag">' + tag + '</div>'
      + '<h1 class="article-title">' + escapeHtml(news.title) + '</h1>'
      + '<div class="article-meta">'
      +   '<span>' + calSvg + ' ' + formatDate(news.created_at) + '</span>'
      +   (isFromInstagram ? '<span>' + igSvg + ' Izvor: Instagram</span>' : '')
      + '</div>'
      + (mainImage
          ? '<img src="' + escapeHtml(mainImage) + '" alt="' + escapeHtml(news.title) + '" class="article-image" id="articleMainImg" loading="eager" decoding="async" onerror="this.style.display=\'none\'">'
          : '')
      + gallerySection
      + '<div class="article-body">' + escapeHtml(news.description || '') + '</div>'
      + (isFromInstagram
          ? '<a href="' + escapeHtml(news.instagram_post_url) + '" target="_blank" rel="noopener" class="article-ig-link">' + igSvg + ' Pogledaj originalnu objavu na Instagramu ' + extSvg + '</a>'
          : '<a href="https://www.instagram.com/kragujevacsport/" target="_blank" rel="noopener" class="article-ig-link">' + igSvg + ' Prati @kragujevacsport za više vesti ' + extSvg + '</a>');

    // Wire up lightbox
    const main = document.getElementById('articleMainImg');
    if (main) { main.style.cursor = 'zoom-in'; main.addEventListener('click', () => openLightbox(0)); }
    document.querySelectorAll('.gallery-thumb').forEach(btn => {
      btn.addEventListener('click', () => openLightbox(+btn.dataset.idx));
    });
  }

  function excerpt(text, max) {
    if (!text) return '';
    return text.length > max ? text.slice(0, max).trim() + '…' : text;
  }

  function setMeta(name, content) {
    let el = document.querySelector('meta[name="' + name + '"]');
    if (!el) { el = document.createElement('meta'); el.setAttribute('name', name); document.head.appendChild(el); }
    el.setAttribute('content', content);
  }

  function setOg(property, content) {
    let el = document.querySelector('meta[property="' + property + '"]');
    if (!el) { el = document.createElement('meta'); el.setAttribute('property', property); document.head.appendChild(el); }
    el.setAttribute('content', content);
  }

  function setCanonical(href) {
    let el = document.querySelector('link[rel="canonical"]');
    if (!el) { el = document.createElement('link'); el.setAttribute('rel', 'canonical'); document.head.appendChild(el); }
    el.setAttribute('href', href);
  }

  function injectArticleSchema(news, images) {
    const prev = document.getElementById('articleSchema');
    if (prev) prev.remove();
    const schema = {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": news.title,
      "datePublished": news.created_at,
      "dateModified": news.created_at,
      "inLanguage": "sr-RS",
      "mainEntityOfPage": location.href,
      "articleSection": news.category || "Sport",
      "image": images.length ? images : undefined,
      "description": excerpt(news.description || news.title, 155),
      "publisher": {
        "@type": "NewsMediaOrganization",
        "name": "Kragujevac Sport",
        "url": "https://kragujevacsport.com/",
        "logo": { "@type": "ImageObject", "url": "https://kragujevacsport.com/favicon.svg" }
      }
    };
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.id = 'articleSchema';
    s.textContent = JSON.stringify(schema);
    document.head.appendChild(s);
  }

  function showNotFound() {
    document.getElementById('articleWrap').innerHTML =
      '<a href="index.html" class="back-btn">' + backSvg + ' Sve vesti</a>'
      + '<div class="empty-state" style="margin-top:40px;">'
      +   '<div class="empty-icon">'
      +     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
      +   '</div>'
      +   '<h3>Vest nije pronađena</h3>'
      +   '<p>Možda je obrisana ili ne postoji.</p>'
      + '</div>';
  }

  // ─── LIGHTBOX ───────────────────────────────────────────────────────
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  function openLightbox(i) {
    if (!currentGallery.length) return;
    lbIdx = i % currentGallery.length;
    lbImg.src = currentGallery[lbIdx];
    lb.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lb.classList.remove('is-open');
    document.body.style.overflow = '';
  }
  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', () => openLightbox((lbIdx - 1 + currentGallery.length) % currentGallery.length));
  document.getElementById('lbNext').addEventListener('click', () => openLightbox((lbIdx + 1) % currentGallery.length));
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('is-open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') openLightbox((lbIdx + 1) % currentGallery.length);
    if (e.key === 'ArrowLeft') openLightbox((lbIdx - 1 + currentGallery.length) % currentGallery.length);
  });

  // ─── SIDE BANNERS ────────────────────────────────────────────────────
  async function loadBanners() {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/ads?active=eq.true&select=*&order=sort_order.asc,id.asc', {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
      });
      if (!res.ok) return;
      const ads = await res.json();
      if (!Array.isArray(ads)) return;
      renderBanner('bannerLeft',  ads.filter(a => a.position === 'left'));
      renderBanner('bannerRight', ads.filter(a => a.position === 'right'));
    } catch (_) {}
  }

  function renderBanner(slotId, ads) {
    const slot = document.getElementById(slotId);
    if (!slot || !ads.length) return;
    const perAdMs = Math.max(4000, Math.floor(60000 / ads.length));
    slot.querySelector('.side-banner-empty')?.remove();
    const label = slot.querySelector('.side-banner-label');
    slot.innerHTML = '';
    if (label) slot.appendChild(label);

    ads.forEach((ad, i) => {
      const el = ad.link_url ? document.createElement('a') : document.createElement('div');
      if (ad.link_url) { el.href = ad.link_url; el.target = '_blank'; el.rel = 'noopener sponsored'; }
      el.className = 'side-banner-link';
      el.style.position = 'absolute';
      el.style.inset = '0';
      el.setAttribute('aria-label', 'Reklama: ' + (ad.client_name || ''));
      const img = document.createElement('img');
      img.src = ad.image_url;
      img.alt = ad.client_name || 'Reklama';
      img.className = 'side-banner-img' + (i === 0 ? ' is-active' : '');
      img.loading = 'lazy';
      img.decoding = 'async';
      el.appendChild(img);
      slot.appendChild(el);
    });

    if (ads.length > 1) {
      let idx = 0;
      const imgs = slot.querySelectorAll('.side-banner-img');
      setInterval(() => {
        imgs[idx].classList.remove('is-active');
        idx = (idx + 1) % imgs.length;
        imgs[idx].classList.add('is-active');
      }, perAdMs);
    }
  }

  async function loadArticle() {
    if (!newsId) { showNotFound(); return; }
    try {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/news?id=eq.' + encodeURIComponent(newsId) + '&select=*&limit=1',
        { headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON } }
      );
      const data = await res.json();
      const news = Array.isArray(data) ? data[0] : null;
      if (news) { renderArticle(news); return; }
    } catch(e) {}
    showNotFound();
  }

  loadArticle();
  loadBanners();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
</script>

</body>
</html>
