  const catParam = new URLSearchParams(location.search).get('cat') || '';

  });

  if (catParam) {

    document.querySelector('link[rel="canonical"]').href = catUrl;
    document.querySelector('meta[property="og:url"]').content = catUrl;

  }

  // ─── AUTH ─────────────────────────────────────────────────────────────────
  async function initAuth() {
    let { data: { session } } = await sb.auth.getSession();
    if (!session) {
      const match = document.cookie.match(/(?:^|;\s*)ks_rt=([^;]+)/);
      if (match) {
        try {
          const { data } = await sb.auth.refreshSession({ refresh_token: decodeURIComponent(match[1]) });
          if (data?.session) {
            document.cookie = 'ks_rt=' + encodeURIComponent(data.session.refresh_token) + '; max-age=2592000; path=/; SameSite=Lax';
            session = data.session;
          } else {
            document.cookie = 'ks_rt=; max-age=0; path=/; SameSite=Lax';
          }
        } catch (_) {}
      }
    }
    currentUser = session?.user || null;
    updateAuthUI(currentUser);
  }

  initAuth();

  sb.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    updateAuthUI(currentUser);
    if (event === 'SIGNED_OUT') {
      document.cookie = 'ks_rt=; max-age=0; path=/; SameSite=Lax';
    }
  });

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function decodeHtml(html) {
    if (!html) return '';
    const txt = document.createElement('textarea');
    txt.innerHTML = html;
    return txt.value;
  }

  function updateAuthUI(user) {
    const el = document.getElementById('headerAuth');
    const mobileEl = document.getElementById('mobileMenuAuth');
    if (!user) {
      el.innerHTML = '<a href="/login" class="btn-auth-login">Prijavi se</a>';
      if (mobileEl) mobileEl.innerHTML = '<a href="/login" class="btn-auth-login">Prijavi se</a>';
      return;
    }
    const name = user.user_metadata?.full_name || user.email.split('@')[0];
    const initials = name.slice(0, 2).toUpperCase();
    const userMenuHtml =
      '<div style="position:relative;">'
      + '<button class="btn-user-menu" id="userMenuBtn">'
      +   '<span class="user-avatar">' + escapeHtml(initials) + '</span>'
      +   '<span>' + escapeHtml(name) + '</span>'
      + '</button>'
      + '<div class="user-dropdown" id="userDropdown">'
      +   '<button class="user-dropdown-item" id="signOutBtn">Odjavi se</button>'
      + '</div>'
      + '</div>';
    el.innerHTML = userMenuHtml;
    if (mobileEl) {
      mobileEl.innerHTML =
        '<button class="mobile-user-menu" id="mobileUserMenuBtn">'
        +   '<span class="user-avatar">' + escapeHtml(initials) + '</span>'
        +   '<span>' + escapeHtml(name) + '</span>'
        + '</button>'
        + '<button class="mobile-user-signout" id="mobileSignOutBtn">Odjavi se</button>';
      document.getElementById('mobileSignOutBtn').addEventListener('click', async () => {
        document.cookie = 'ks_rt=; max-age=0; path=/; SameSite=Lax';
        await sb.auth.signOut();
      });
    }
    document.getElementById('userMenuBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('userDropdown').classList.toggle('is-open');
    });
    document.getElementById('signOutBtn').addEventListener('click', async () => {
      document.cookie = 'ks_rt=; max-age=0; path=/; SameSite=Lax';
      await sb.auth.signOut();
    });
  }

  document.addEventListener('click', () => {
    document.getElementById('userDropdown')?.classList.remove('is-open');
  });

  // ─── HELPERS ──────────────────────────────────────────────────────────────
  const clockSvg   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="13" height="13"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
  const ballSvg    = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" width="56" height="56"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 1.5c1.18 0 2.31.26 3.33.72l-2.1 1.28-1.23-.72-1.27.72-2.04-1.26A8.5 8.5 0 0 1 12 3.5zM7.41 5.1l2.05 1.27-.66 3.63H6.2l-1.7-2.4A8.54 8.54 0 0 1 7.41 5.1zm9.18 0a8.54 8.54 0 0 1 2.91 2.5L17.8 10H15.2L14.54 6.37l2.05-1.27zM4.1 9h2.5l1.77 4.88-2.6 1.89A8.5 8.5 0 0 1 4.1 9zm5.02 0h5.76l1.72 4.74-4.6 3.36-4.6-3.36L9.12 9zm7.36 0h2.5a8.5 8.5 0 0 1-1.67 6.77l-2.6-1.89L16.48 9zm-10.9 7.7 2.37-1.73 3.55 2.6v2.63A8.52 8.52 0 0 1 5.58 16.7zm12.84 0A8.52 8.52 0 0 1 12.5 20.2v-2.63l3.55-2.6 2.37 1.73z"/></svg>';
  const gallerySvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="13" height="13"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
  const commentSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="13" height="13"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

  function relativeTime(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return 'upravo';
    if (diff < 3600) return Math.floor(diff/60) + ' min';
    if (diff < 86400) return 'pre ' + Math.floor(diff/3600) + 'h';
    if (diff < 172800) return 'juče';
    return new Date(dateStr).toLocaleDateString('sr-RS', {day:'numeric',month:'short'});
  }

  function excerpt(text, max = 140) {
    if (!text) return '';
    return text.length > max ? text.slice(0, max).trim() + '…' : text;
  }

  function galleryCount(n) {
    const g = Array.isArray(n.gallery) ? n.gallery : [];
    const base = n.image_url ? 1 : 0;
    const extra = g.filter(x => x && x.url && x.url !== n.image_url).length;
    return base + extra;
  }

// ─── HERO SECTION ─────────────────────────────────────────────────────────
  function buildHero(news, commentCounts = {}) {
    if (news.length < 2) return;
    const section  = document.getElementById('heroSection');
    const featured = document.getElementById('heroFeatured');
    const sidebar  = document.getElementById('heroSidebar');
    const main = news[0];
    const sidePosts = news.slice(1, 3);

    featured.innerHTML =
      '<a href="/vest?id=' + encodeURIComponent(main.id) + '" aria-label="' + escapeHtml(decodeHtml(main.title)) + '">'
      + (main.image_url
        ? '<img src="' + escapeHtml(main.image_url) + '" alt="' + escapeHtml(decodeHtml(main.title)) + '" loading="eager" decoding="async">'
        : '<div class="hero-placeholder">' + ballSvg + '</div>')
      + '<span class="hero-featured-badge">Izdvojeno</span>'
      + '<div class="hero-featured-overlay"></div>'
      + '<div class="hero-featured-body">'
      +   '<span class="hero-featured-tag">' + escapeHtml(decodeHtml(main.category || 'Sport')) + '</span>'
      +   '<div class="hero-featured-title">' + escapeHtml(decodeHtml(main.title)) + '</div>'
      +   '<div class="hero-featured-time">' + relativeTime(main.created_at) + '</div>'
      + '</div>'
      + '</a>';

    sidebar.innerHTML = sidePosts.map(n => {
      const ex = excerpt(decodeHtml(n.content || n.summary || n.description || ''), 100);
      const cc = commentCounts[n.id] || 0;
      return '<a href="/vest?id=' + encodeURIComponent(n.id) + '" class="hero-sidebar-item" aria-label="' + escapeHtml(decodeHtml(n.title)) + '">'
      + (n.image_url
        ? '<img src="' + escapeHtml(n.image_url) + '" alt="" class="hero-sidebar-img" loading="lazy" decoding="async">'
        : '<div class="hero-sidebar-no-img">' + ballSvg + '</div>')
      + '<div class="hero-sidebar-body">'
      +   '<span class="hero-sidebar-tag">' + escapeHtml(decodeHtml(n.category || 'Sport')) + '</span>'
      +   '<div class="hero-sidebar-title">' + escapeHtml(decodeHtml(n.title)) + '</div>'
      +   (ex ? '<p class="hero-sidebar-excerpt">' + escapeHtml(ex) + '</p>' : '')
      +   '<div class="hero-sidebar-meta">'
      +     '<span class="hero-sidebar-time">' + relativeTime(n.created_at) + '</span>'
      +     '<span class="hero-sidebar-comments">' + commentSvg + ' ' + cc + '</span>'
      +   '</div>'
      + '</div>'
      + '</a>';
    }).join('');

    section.style.display = '';
  }

  // ─── NEWS GRID ─────────────────────────────────────────────────────────────
  function buildGrid(news, commentCounts = {}) {
    const grid = document.getElementById('newsGrid');
    const countEl = document.getElementById('sectionCount');
    if (countEl) countEl.textContent = news.length ? news.length + (news.length === 1 ? ' vest' : (news.length < 5 ? ' vesti' : ' vesti')) : '';
    if (!news.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;"><div class="empty-state"><h3>Nema vesti za prikaz</h3><p>Vesti će biti dostupne uskoro.</p></div></div>';
      return;
    }

    const arrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

    const IN_GRID_AFTER = 3;
    const bannerSlot = '<div id="bannerInGrid" class="in-grid-banner-slot" aria-label="Reklamna pozicija"></div>';

    const cards = news.map(n => {
      const hasImg = !!n.image_url;
      const tag = escapeHtml(decodeHtml(n.category || 'Sport'));
      const count = galleryCount(n);
      const cc = commentCounts[n.id] || 0;
      const badge = count > 1
        ? '<div class="card-gallery-badge">' + gallerySvg + ' ' + count + '</div>'
        : '';
      const ex = excerpt(decodeHtml(n.content || n.summary || n.description || ''), 130);
      return ''
        + '<a href="/vest?id=' + encodeURIComponent(n.id) + '" class="news-card" aria-label="' + escapeHtml(decodeHtml(n.title)) + '">'
        +   '<div class="card-image-wrap">'
        +     (hasImg
              ? '<img src="' + escapeHtml(n.image_url) + '" alt="' + escapeHtml(decodeHtml(n.title)) + '" class="card-image" loading="lazy" decoding="async" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
              : '')
        +     '<div class="card-image-placeholder"' + (hasImg ? ' style="display:none"' : '') + '>' + ballSvg + '</div>'
        +     '<span class="card-tag-overlay">' + tag + '</span>'
        +     badge
        +   '</div>'
        +   '<div class="card-body">'
        +     '<h2 class="card-title">' + escapeHtml(decodeHtml(n.title)) + '</h2>'
        +     (ex ? '<p class="card-excerpt">' + escapeHtml(ex) + '</p>' : '')
        +     '<div class="card-meta">'
        +       '<span class="card-time">' + clockSvg + ' ' + relativeTime(n.created_at) + '</span>'
        +       '<span class="card-comments">' + commentSvg + ' ' + cc + '</span>'
        +       '<span class="card-read-more">Pročitaj ' + arrowSvg + '</span>'
        +     '</div>'
        +   '</div>'
        + '</a>';
    });

    const before = cards.slice(0, IN_GRID_AFTER).join('');
    const after  = cards.slice(IN_GRID_AFTER).join('');
    grid.innerHTML = before + (cards.length > IN_GRID_AFTER ? bannerSlot : '') + after;

    injectItemListSchema(news);
  }

  function injectItemListSchema(news) {
    const prev = document.getElementById('itemListSchema');
    if (prev) prev.remove();
    const BASE = 'https://kragujevacsport.com';
    const schema = {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Najnovije sportske vesti iz Kragujevca",
      "numberOfItems": Math.min(news.length, 10),
      "mainEntityOfPage": { "@id": BASE + "/#homepage" },
      "itemListElement": news.slice(0, 10).map((n, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "url": BASE + '/vest/' + encodeURIComponent(n.id),
        "name": decodeHtml(n.title)
      }))
    };
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.id = 'itemListSchema';
    s.textContent = JSON.stringify(schema);
    document.head.appendChild(s);
  }

  // ─── HORIZONTAL BANNERS ───────────────────────────────────────────────────
  async function loadBanners() {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/ads?active=eq.true&select=*&order=sort_order.asc,id.asc', {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
      });
      if (!res.ok) return;
      const ads = await res.json();
      if (!Array.isArray(ads)) return;
      renderHBanner('bannerTop',    ads.filter(a => a.position === 'top'));
      renderHBanner('bannerMiddle', ads.filter(a => a.position === 'middle'));
      renderHBanner('bannerInGrid', ads.filter(a => a.position === 'in_grid'));
    } catch (_) {}
  }

  function renderHBanner(slotId, ads) {
    const slot = document.getElementById(slotId);
    if (!slot || !ads.length) return;
    slot.classList.add('has-ads');
    slot.innerHTML = '<span class="h-banner-label">Reklama</span>';
    const perAdMs = Math.max(4000, Math.floor(60000 / ads.length));

    ads.forEach((ad, i) => {
      const el = ad.link_url ? document.createElement('a') : document.createElement('div');
      if (ad.link_url) { el.href = ad.link_url; el.target = '_blank'; el.rel = 'noopener sponsored'; }
      el.className = 'h-banner-link';
      el.setAttribute('aria-label', 'Reklama: ' + (ad.client_name || ''));
      const img = document.createElement('img');
      img.src = ad.image_url;
      img.alt = ad.client_name || 'Reklama';
      img.className = 'h-banner-img' + (i === 0 ? ' is-active' : '');
      img.loading = 'lazy'; img.decoding = 'async';
      el.appendChild(img);
      slot.appendChild(el);
    });

    if (ads.length > 1) {
      let idx = 0;
      const imgs = slot.querySelectorAll('.h-banner-img');
      setInterval(() => {
        imgs[idx].classList.remove('is-active');
        idx = (idx + 1) % imgs.length;
        imgs[idx].classList.add('is-active');
      }, perAdMs);
    }
  }

  // ─── LOAD NEWS ────────────────────────────────────────────────────────────
  async function loadNews() {
    try {
      let newsUrl = SUPABASE_URL + '/rest/v1/news?select=*&order=created_at.desc';
      if (catParam) newsUrl += '&category=eq.' + encodeURIComponent(catParam);
      const cmtUrl = SUPABASE_URL + '/rest/v1/comments?select=news_id';
      const headers = { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON };

      const [newsJson, cmtJson] = await Promise.all([
        fetch(newsUrl, { headers }).then(r => r.ok ? r.json() : []),
        fetch(cmtUrl,  { headers }).then(r => r.ok ? r.json() : [])
      ]);

      const data = Array.isArray(newsJson) ? newsJson : [];
      allNewsCache = data;
      if (searchInput && searchInput.value.trim()) renderSearchResults(searchInput.value.trim());

      const commentCounts = {};
      if (Array.isArray(cmtJson)) {
        for (const c of cmtJson) {
          if (c.news_id) commentCounts[c.news_id] = (commentCounts[c.news_id] || 0) + 1;
        }
      }

      if (!catParam && data.length >= 2) {
        buildHero(data.slice(0, 3), commentCounts);
        buildGrid(data.slice(3), commentCounts);
      } else {
        buildGrid(data, commentCounts);
      }
      fixSvgDimensions();
    } catch (e) {
      buildGrid([]);
    }
  }

  loadNews();
  loadBanners();
  setInterval(loadNews, 5 * 60 * 1000);
  setInterval(loadBanners, 10 * 60 * 1000);

  function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeLabel();
  }

  function updateThemeLabel() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const label = document.getElementById('mobileThemeLabel');
    if (label) label.textContent = isDark ? 'Svetla tema' : 'Tamna tema';
  }

  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('mobileThemeToggle').addEventListener('click', toggleTheme);

  updateThemeLabel();

  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  mobileMenuBtn.addEventListener('click', () => {
    const isOpen = mobileMenu.classList.toggle('is-open');
    mobileMenuBtn.setAttribute('aria-expanded', isOpen);
  });

  document.addEventListener('click', (e) => {
    if (!mobileMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
      mobileMenu.classList.remove('is-open');
      mobileMenuBtn.setAttribute('aria-expanded', 'false');
    }
  });

  // Add width/height to dynamically-generated SVGs to prevent them from rendering at full size
  function fixSvgDimensions() {
    document.querySelectorAll('.card-image-placeholder svg').forEach(svg => {
      if (!svg.hasAttribute('width')) svg.setAttribute('width', '56');
      if (!svg.hasAttribute('height')) svg.setAttribute('height', '56');
    });
    document.querySelectorAll('.card-comments svg').forEach(svg => {
      if (!svg.hasAttribute('width')) svg.setAttribute('width', '13');
      if (!svg.hasAttribute('height')) svg.setAttribute('height', '13');
    });
    document.querySelectorAll('.card-time svg').forEach(svg => {
      if (!svg.hasAttribute('width')) svg.setAttribute('width', '13');
      if (!svg.hasAttribute('height')) svg.setAttribute('height', '13');
    });
    document.querySelectorAll('.hero-sidebar-comments svg').forEach(svg => {
      if (!svg.hasAttribute('width')) svg.setAttribute('width', '12');
      if (!svg.hasAttribute('height')) svg.setAttribute('height', '12');
    });
  }

  // ─── SEARCH ───────────────────────────────────────────────────────────────
  let allNewsCache = [];

  const searchBtn       = document.getElementById('searchBtn');
  const searchOverlay   = document.getElementById('searchOverlay');
  const searchInput     = document.getElementById('searchInput');
  const searchClearBtn  = document.getElementById('searchClearBtn');
  const searchResultsWrap = document.getElementById('searchResultsWrap');

  function openSearch() {
    searchOverlay.classList.add('is-open');
    searchBtn.classList.add('is-active');
    searchBtn.setAttribute('aria-expanded', 'true');
    searchInput.focus();
    renderSearchResults(searchInput.value.trim());
  }

  function closeSearch() {
    searchOverlay.classList.remove('is-open');
    searchBtn.classList.remove('is-active');
    searchBtn.setAttribute('aria-expanded', 'false');
  }

  searchBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    searchOverlay.classList.contains('is-open') ? closeSearch() : openSearch();
  });

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClearBtn.classList.toggle('visible', q.length > 0);
    renderSearchResults(q);
  });

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeSearch(); searchBtn.focus(); }
  });

  searchClearBtn.addEventListener('click', () => {
    searchInput.value = '';
    searchClearBtn.classList.remove('visible');
    renderSearchResults('');
    searchInput.focus();
  });

  document.addEventListener('click', (e) => {
    if (searchOverlay.classList.contains('is-open') &&
        !searchOverlay.contains(e.target) &&
        !searchBtn.contains(e.target)) {
      closeSearch();
    }
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderSearchResults(q) {
    if (!q) {
      searchResultsWrap.innerHTML = '<p class="search-hint-text">Ukucajte pojam za pretragu vesti…</p>';
      return;
    }
    const lower = q.toLowerCase();
    const results = allNewsCache.filter(n =>
      (n.title       && n.title.toLowerCase().includes(lower)) ||
      (n.description && n.description.toLowerCase().includes(lower))
    ).slice(0, 8);

    if (!results.length) {
      searchResultsWrap.innerHTML = '<p class="search-no-results">Nema rezultata za <strong>"' + escHtml(q) + '"</strong></p>';
      return;
    }

    const imgPh = '<div class="search-result-thumb-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
    const items = results.map(n =>
      '<a class="search-result-item" href="vest/' + encodeURIComponent(n.id) + '">' +
        (n.image_url ? '<img class="search-result-thumb" src="' + escHtml(n.image_url) + '" alt="" loading="lazy"/>' : imgPh) +
        '<div class="search-result-body">' +
          (n.category ? '<span class="search-result-cat">' + escHtml(n.category) + '</span>' : '') +
          '<p class="search-result-title">' + escHtml(n.title || '') + '</p>' +
          '<span class="search-result-date">' + relativeTime(n.created_at) + '</span>' +
        '</div>' +
      '</a>'
    ).join('');

    const plural = results.length === 1 ? 'rezultat' : results.length < 5 ? 'rezultata' : 'rezultata';
    searchResultsWrap.innerHTML =
      '<p class="search-status-text">' + results.length + ' ' + plural + '</p>' + items;
  }

  // Pre-fill search from URL param
  const searchParam = new URLSearchParams(location.search).get('search') || '';
  if (searchParam) {
    searchInput.value = searchParam;
    searchClearBtn.classList.add('visible');
    openSearch();
  }

  document.getElementById('mobileMenu').addEventListener('click', (e) => {
    if (e.target.closest('a')) {
      mobileMenu.classList.remove('is-open');
      mobileMenuBtn.setAttribute('aria-expanded', 'false');
    }
  });
</script>

</body>
</html>
